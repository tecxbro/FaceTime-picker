openapi: 3.1.1
info:
  title: FaceTime Picker Trusted Callers API
  version: 1.0.0
  description: |
    Provider-neutral allowlist contract consumed by the FaceTime Picker macOS helper.

    New integrations should return the canonical camelCase envelope. The current
    client also accepts a bare array and snake_case compatibility field names.
    Unknown JSON properties are ignored by the client.
paths:
  /trusted-callers:
    get:
      operationId: getTrustedCallers
      summary: Return the current trusted-caller allowlist
      description: |
        FaceTime Picker sends an HTTPS GET with Accept: application/json and
        accepts only HTTP 200. Authentication is provider-defined; the client can
        map arbitrary request headers to runtime environment variables.
      responses:
        '200':
          description: Current trusted-caller records.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/TrustedCallerEnvelope'
                  - $ref: '#/components/schemas/TrustedCallerArray'
              examples:
                canonicalEnvelope:
                  summary: Recommended response
                  value:
                    schemaVersion: 1
                    trustedCallers:
                      - id: caller-123
                        phoneNumber: '+1 202 555 0147'
                        enabled: true
                    cacheTTLSeconds: 300
                bareArray:
                  summary: Compatibility response
                  value:
                    - id: caller-123
                      phone_number: '+1 202 555 0147'
                      enabled: true
        '401':
          description: Authentication is required or invalid.
        '403':
          description: The caller is not permitted to read the allowlist.
        '429':
          description: Provider-side rate limit.
        '500':
          description: Provider-side failure.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Example only. Providers may use any header-based authentication.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Example only. Providers may choose a different header name.
  schemas:
    TrustedCallerEnvelope:
      type: object
      description: |
        Versioned response envelope. CamelCase is canonical. Snake_case aliases
        are accepted for compatibility, and a response may technically mix the
        two styles because the client decodes each field independently.
      anyOf:
        - required: [trustedCallers]
        - required: [trusted_callers]
      properties:
        schemaVersion:
          type: integer
          const: 1
          default: 1
        schema_version:
          type: integer
          const: 1
          default: 1
          deprecated: true
        trustedCallers:
          $ref: '#/components/schemas/TrustedCallerArray'
        trusted_callers:
          allOf:
            - $ref: '#/components/schemas/TrustedCallerArray'
          deprecated: true
        cacheTTLSeconds:
          type: integer
          description: Client refresh suggestion. Runtime values are clamped to 30–86400 seconds.
        cache_ttl_seconds:
          type: integer
          description: Snake_case compatibility alias for cacheTTLSeconds.
          deprecated: true
      additionalProperties: true
    TrustedCallerArray:
      type: array
      minItems: 1
      items:
        $ref: '#/components/schemas/TrustedCaller'
      description: |
        At least one enabled record with a valid number must remain after client
        filtering. The runtime rejects an empty effective allowlist.
    TrustedCaller:
      type: object
      anyOf:
        - required: [phoneNumber]
        - required: [phone_number]
      properties:
        id:
          type: string
          description: Optional provider-owned identifier; not used for matching.
        phoneNumber:
          type: string
          description: |
            Canonical field. Prefer E.164 display formatting. The client removes
            punctuation and requires 7–15 digits after normalization.
        phone_number:
          type: string
          description: Snake_case compatibility alias for phoneNumber.
          deprecated: true
        enabled:
          type: boolean
          default: true
          description: Disabled records are ignored.
      additionalProperties: true

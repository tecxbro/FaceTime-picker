name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Validate shell scripts
        run: zsh -n build.sh test.sh run.sh

      - name: Core tests
        run: zsh ./test.sh

      - name: Native macOS build
        run: zsh ./build.sh

      - name: Configuration regression scan
        run: |
          ! grep -RIn --exclude-dir=.git --exclude-dir=build -- '--trusted-number' .
          ! grep -RIn --exclude-dir=.git --exclude-dir=build 'var number = "+' Sources Tests

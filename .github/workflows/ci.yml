name: CI

on:
  push:
    branches:
      - main
      - local
  pull_request:
    branches:
      - main
      - local

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Swift version
        run: swift --version
      - name: Core tests
        run: zsh "./Validate Core Logic.command"
      - name: Native macOS build
        run: zsh ./build.sh
      - name: Local-branch privacy regression scan
        run: |
          ! grep -RIn --exclude-dir=.git -- '--trusted-number' Sources *.command
          ! grep -RIn --exclude-dir=.git -E 'FACETIME_PICKER_IDENTITY_URL|URLSession|HTTPURLResponse' Sources
          ! grep -RIn -E '216.?571.?5884|Paras Mama' Sources README.md SECURITY.md docs scripts *.command
          grep -RIn 'FACETIME_PICKER_SQLITE_PATH' README.md Sources scripts

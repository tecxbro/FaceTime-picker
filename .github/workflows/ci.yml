name: CI

on:
  push:
    branches: [local]
  pull_request:
    branches: [local]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Test and build
        run: zsh ./test.sh
